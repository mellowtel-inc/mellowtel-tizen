<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Mellowtel Demo</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background: #0b0b0d;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
      }
      .wrap {
        padding: 80px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 56px;
        margin: 0 0 16px;
      }
      .sub {
        font-size: 26px;
        color: #9a9aa0;
        margin: 0 0 56px;
      }
      .row {
        display: flex;
        gap: 32px;
        margin-bottom: 48px;
      }
      .card {
        background: #18181b;
        border-radius: 18px;
        padding: 40px 48px;
        min-width: 320px;
      }
      .card .label {
        font-size: 24px;
        color: #9a9aa0;
        margin-bottom: 14px;
      }
      .card .value {
        font-size: 64px;
        font-weight: bold;
      }
      #status {
        font-size: 30px;
        margin-bottom: 40px;
      }
      .dot {
        display: inline-block;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        margin-right: 14px;
        vertical-align: middle;
        background: #6b6b70;
      }
      .dot.on {
        background: #30d158;
      }
      .dot.off {
        background: #ff453a;
      }
      .buttons {
        display: flex;
        gap: 24px;
      }
      button {
        font-size: 30px;
        padding: 22px 56px;
        border: 4px solid transparent;
        border-radius: 14px;
        background: #2c2c2e;
        color: #fff;
        outline: none;
        cursor: pointer;
      }
      button.focused {
        border-color: #fff;
        transform: scale(1.05);
      }
      button.primary {
        background: #0a84ff;
      }
      #nodeId {
        position: absolute;
        bottom: 36px;
        left: 80px;
        font-size: 20px;
        color: #6b6b70;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Mellowtel Demo</h1>
      <p class="sub">A sample Tizen TV app sharing unused bandwidth, with consent.</p>

      <div id="status"><span id="dot" class="dot"></span><span id="statusText">Initializing…</span></div>

      <div class="row">
        <div class="card">
          <div class="label">Requests today</div>
          <div class="value" id="daily">0</div>
        </div>
        <div class="card">
          <div class="label">Total requests</div>
          <div class="value" id="total">0</div>
        </div>
      </div>

      <div class="buttons">
        <button id="btnToggle" class="primary focused">Opt in</button>
        <button id="btnConsent">Show consent dialog</button>
      </div>
    </div>
    <div id="nodeId">node: —</div>

    <!-- The bundled SDK (copy of dist/mellowtel-tizen.umd.js). Exposes window.Mellowtel -->
    <script src="js/mellowtel-tizen.umd.js"></script>
    <script src="main.js"></script>
    <!-- demo/index.html -->
<script src="../mellowtel-tizen/dist/mellowtel-tizen.umd.js"></script>
<script>
  (async () => {
    const mellowtel = new Mellowtel('mellowtel_test_extension');
    await mellowtel.initBackground();
    
    // Test the SDK's public API
    console.log('nodeId:', await mellowtel.getStats());
    console.log('optIn status:', await mellowtel.getOptInStatus());
    
    // Force opt-in for testing (skip dialog)
    await mellowtel.optIn();
    
    // Try to start — this will attempt WebSocket connection
    await mellowtel.start();
  })();
</script>
  </body>
</html>
